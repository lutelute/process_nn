name: verify
on:
  push:
    branches: [main]
  pull_request:

jobs:
  tokenizer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: GPT-2 トークナイザの既知値・往復一致を検証
        run: node tools/verify.mjs
