name: verify
on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: GPT-2 トークナイザの既知値・往復一致を検証
        run: node tools/verify.mjs
      - name: 全 50 ページの静的健全性を検証（リンク切れ・インライン JS 構文）
        run: node tools/check-pages.mjs
